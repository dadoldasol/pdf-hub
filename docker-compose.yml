services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pdf_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdf_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

